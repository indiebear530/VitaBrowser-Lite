name: Build Vita VPK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake ninja-build build-essential git python3

    - name: Install VitaSDK
      run: |
        git clone https://github.com/vitasdk/vdpm.git
        cd vdpm
        chmod +x bootstrap-vitasdk.sh
        ./bootstrap-vitasdk.sh

    - name: Set VitaSDK env
      run: |
        echo "VITASDK=$HOME/vitasdk" >> $GITHUB_ENV
        echo "$HOME/vitasdk/bin" >> $GITHUB_PATH

    - name: Configure build
      run: |
        mkdir -p build
        cd build
        cmake ..

    - name: Build project
      run: |
        cd build
        make -j2

    - name: Package VPK
      run: |
        cd build
        vita-mksfoex -s TITLE_ID=VITB00001 "VitaBrowser Lite" param.sfo
        vita-pack-vpk eboot.bin \
          -s param.sfo \
          -i ../sce_sys/icon0.png \
          ../sce_sys/ \
          VitaBrowser.vpk

    - name: Upload VPK
      uses: actions/upload-artifact@v4
      with:
        name: VitaBrowser-VPK
        path: build/*.vpk
