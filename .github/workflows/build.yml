name: Build VPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools + Build fresh vita2d + stubs
        run: |
          apt-get update && apt-get install -y git make cmake
          
          # Fresh stubs
          rm -rf /usr/local/vitasdk/arm-vita-eabi/lib/libSce*stub.a
          git clone --depth=1 https://github.com/vitasdk/vita-headers.git /tmp/headers
          cd /tmp/headers && make install
          git clone --depth=1 https://github.com/vitasdk/vita-libs.git /tmp/libs
          cd /tmp/libs && make install
          
          # Build vita2d from source (most reliable)
          git clone --depth=1 https://github.com/vitasdk/vita2dlib.git /tmp/vita2d
          cd /tmp/vita2d && make && make install

      - name: Build Project
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -- -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-VPK
          path: build/*.vpk
