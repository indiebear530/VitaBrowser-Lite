name: Vita Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-vpk:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: apk add --no-cache make cmake ca-certificates openssl unzip curl

      - name: Build & install vita2dlib
        run: |
          curl -L -f --retry 5 -o /tmp/vita2d.zip https://github.com/xerpi/libvita2d/archive/refs/heads/master.zip
          unzip /tmp/vita2d.zip -d /tmp
          
          echo "=== Listing extracted files ==="
          ls -la /tmp/libvita2d-master/
          ls -la /tmp/libvita2d-master/libvita2d/
          
          cd /tmp/libvita2d-master/libvita2d
          echo "=== Current directory after cd ==="
          ls -la
          
          make -j2
          make install

      - name: Configure project
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=${VITASDK}/share/vita.toolchain.cmake

      - name: Build project
        run: cmake --build build -- -j2

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-VPK
          path: build/*.vpk
