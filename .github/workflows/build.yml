name: Build VPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Force latest Vita stubs + DEBUG check
        run: |
          apt-get update && apt-get install -y git make curl
          # Wipe old stubs completely
          rm -rf /usr/local/vitasdk/arm-vita-eabi/lib/libSce*stub.a
          # Fresh install
          git clone --depth=1 https://github.com/vitasdk/vita-headers.git /tmp/headers
          cd /tmp/headers && make install
          git clone --depth=1 https://github.com/vitasdk/vita-libs.git /tmp/libs
          cd /tmp/libs && make install
          # Force copy every stub
          cp -v /tmp/libs/stubs/*.a /usr/local/vitasdk/arm-vita-eabi/lib/ || true
          # DEBUG: show if our two missing stubs actually exist now
          echo "=== DEBUG: Checking for the two missing stubs ==="
          ls -la /usr/local/vitasdk/arm-vita-eabi/lib/ | grep -E 'SceFont|SceSharedFb' || echo "NOT FOUND"

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -- -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-VPK
          path: build/*.vpk
