name: CI-Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-vpk:
    runs-on: ubuntu-latest
    container:
      # Official VitaSDK image from the vitasdk organization.
      image: vitasdk/vitasdk:latest
    env:
      VITASDK: /usr/local/vitasdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show VitaSDK toolchain versions
        run: |
        
        
        
        
        
          arm-vita-eabi-gcc --version
          cmake --version

      - name: Configure
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake

      - name: Build
        run: cmake --build build -- -j"$(nproc)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-build
          path: |
            build/eboot.bin
            build/VitaBrowserLite.vpk
name: Vita Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install VitaSDK
        run: |
          wget https://github.com/vitasdk/autobuilds/releases/download/master/vitasdk-latest-linux.tar.gz
          tar xzf vitasdk-latest-linux.tar.gz -C /opt/
          echo "VITASDK=/opt/vitasdk" >> $GITHUB_ENV
          echo "/opt/vitasdk/bin" >> $GITHUB_PATH     - name: Configure (CMake)
          run: |
          cmake -Bbuild -S. \
            -DCMAKE_TOOLCHAIN_FILE=/usr/local/vitasdk/share/vita.toolchain.cmake

      - name: Build
        run: cmake --build build

      # Optional: Run tests if available
      - name: Test (ctest)
        run: |
          if compgen -G "build/*Test" > /dev/null || compgen -G "build/*_test" > /dev/null; then
            cd build && ctest --output-on-failure || true
          else
            echo "No tests detected. Skipping."
          fi

      - name: Find VPK
        id: findvpk
        run: |
          set -e
          VPK=$(find build -maxdepth 1 -type f -name '*.vpk' | head -n 1)
          if [ -z "$VPK" ]; then
            echo "No .vpk found in build/. Did your build succeed and CMake package a .vpk?" >&2
            exit 1
          fi
          echo "vpk_path=$VPK" >> $GITHUB_OUTPUT

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowser-Lite
          path: ${{ steps.findvpk.outputs.vpk_path }}
