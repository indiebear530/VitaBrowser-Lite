- name: Install VitaSDK (stable)
  run: |
    export VITASDK=/usr/local/vitasdk
    echo "VITASDK=$VITASDK" >> $GITHUB_ENV

    sudo mkdir -p $VITASDK

    wget https://github.com/vitasdk/autobuilds/releases/latest/download/vitasdk-x86_64-linux-gnu.tar.xz
    tar -xf vitasdk-x86_64-linux-gnu.tar.xz -C $VITASDK --strip-components=1

    echo "$VITASDK/bin" >> $GITHUB_PATH
