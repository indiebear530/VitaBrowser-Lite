name: Build VPK

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-vpk:
    runs-on: ubuntu-latest
    container:
      image: gnuton/vitasdk-docker:latest   # ← Much more up-to-date

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-vpk
          path: build/*.vpk
