name: Build inside VitaSDK Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (VitaSDK Docker)
        uses: addnab/docker-run-action@v3
        with:
          image: vitasdk/vitasdk:latest
          options: -v ${{ github.workspace }}:/workspace
          run: |
            cd /workspace
            mkdir -p build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release
            make -j$(nproc)
            make vpk    # or "make" if that's enough
