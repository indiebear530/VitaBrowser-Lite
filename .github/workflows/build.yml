name: Vita Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Vita SDK
      uses: vitasdk/docker-action@v1
      with:
        version: latest   # or "stable" if you prefer

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE=${VITASDK}/share/vita.toolchain.cmake \
                 -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Create VPK
      run: |
        cd build
        make vpk   # This assumes your CMakeLists.txt has vita_create_vpk

    - name: Upload VPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: VitaBrowser-Lite-vpk
        path: build/*.vpk
