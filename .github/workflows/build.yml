name: Vita Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-vpk:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: apk add --no-cache make cmake ca-certificates openssl unzip curl git

      - name: Build & install vita2dlib + all stubs
        run: |
          # vita2dlib
          curl -L -f --retry 5 -o /tmp/vita2d.zip https://github.com/xerpi/libvita2d/archive/refs/heads/master.zip
          unzip /tmp/vita2d.zip -d /tmp
          cd /tmp/libvita2d-master/libvita2d
          make -j2
          make install

          # Install fresh stubs (this is the key fix)
          git clone --depth=1 https://github.com/vitasdk/vita-libs.git /tmp/libs
          cd /tmp/libs
          make -j2
          make install

      - name: Configure project
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=${VITASDK}/share/vita.toolchain.cmake

      - name: Build project
        run: cmake --build build -- -j2

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-VPK
          path: build/*.vpk
