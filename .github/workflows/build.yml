name: Vita Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-vpk:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    env:
      VITASDK: /usr/local/vitasdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: apk add --no-cache make cmake curl unzip

      - name: Install vita2dlib + all required stubs
        run: |
          # vita2dlib
          curl -L -f --retry 5 -o /tmp/vita2d.zip https://github.com/xerpi/libvita2d/archive/refs/heads/master.zip
          unzip /tmp/vita2d.zip -d /tmp
          cd /tmp/libvita2d-master/libvita2d
          make -j2
          make install

          # vita-libs (provides SceFont_stub and all other stubs)
          curl -L -f --retry 5 -o /tmp/libs.zip https://github.com/vitasdk/vita-libs/archive/refs/heads/master.zip
          unzip /tmp/libs.zip -d /tmp
          cd /tmp/vita-libs-master
          make -j2
          make install

      - name: Configure project
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake

      - name: Build project
        run: cmake --build build -- -j2

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-VPK
          path: build/*.vpk
