name: Build VPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: gnuton/vitasdk-docker:latest   # fresher base

    steps:
      - uses: actions/checkout@v4

      - name: Update VitaSDK stubs (critical)
        run: |
          apk update && apk add git make
          git clone --depth 1 https://github.com/vitasdk/vita-headers.git /tmp/headers
          cd /tmp/headers && make install
          git clone --depth 1 https://github.com/vitasdk/vita-libs.git /tmp/libs
          cd /tmp/libs && make install

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -- -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite
          path: build/*.vpk
