name: Build & Release Vita Browser VPK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  VITASDK: /usr/local/vitasdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout (Node 24 safe)
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Sanity: reject merge markers
      # ----------------------------
      - name: Check for unresolved merge conflict markers
        run: |
          if rg -n "^(<<<<<<<|=======|>>>>>>>)" . --glob '!.git'; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi
          echo "No unresolved merge conflict markers found."

      # ----------------------------
      # System dependencies
      # ----------------------------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake build-essential wget xz-utils ccache

      # ----------------------------
      # Cache ccache (FAST BUILDS)
      # ----------------------------
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-

      # ----------------------------
      # Cache build folder (SAFE)
      # ----------------------------
      - name: Cache build folder
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            build-${{ runner.os }}-

      # ----------------------------
      # Install VitaSDK (stable)
      # ----------------------------
      - name: Install VitaSDK
        run: |
          sudo mkdir -p $VITASDK

          wget -q https://github.com/vitasdk/autobuilds/releases/latest/download/vitasdk-x86_64-linux-gnu.tar.xz
          sudo tar -xf vitasdk-x86_64-linux-gnu.tar.xz -C $VITASDK --strip-components=1

          echo "$VITASDK/bin" >> $GITHUB_PATH

      # ----------------------------
      # Verify toolchain
      # ----------------------------
      - name: Verify VitaSDK
        run: |
          arm-vita-eabi-gcc --version

      # ----------------------------
      # Build (ccache enabled)
      # ----------------------------
      - name: Build
        run: |
          export PATH="/usr/lib/ccache:$PATH"

          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      # ----------------------------
      # Upload artifact backup
      # ----------------------------
      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vita-browser
          path: build/*.vpk

      # ----------------------------
      # Auto GitHub Release
      # ----------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Vita Browser v1.0.${{ github.run_number }}
          files: build/*.vpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
