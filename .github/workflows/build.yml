name: Build Vita VPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # ✅ Create required Vita structure
    - name: Prepare files
      run: |
        mkdir -p build/sce_sys/livearea/contents
        mkdir -p build/sce_sys

        # Copy your repo files into build
        cp -r * build/ || true

        # Ensure param.sfo exists
        if [ ! -f build/sce_sys/param.sfo ]; then
          echo "DUMMY_SFO" > build/sce_sys/param.sfo
        fi

    # ✅ Package into VPK
    - name: Create VPK
      run: |
        cd build
        zip -r ../VitaBrowser.vpk .
        cd ..

    # ✅ Upload artifact
    - name: Upload VPK
      uses: actions/upload-artifact@v4
      with:
        name: VitaBrowser
        path: VitaBrowser.vpk
