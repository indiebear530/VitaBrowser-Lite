name: CI-Build

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
name: VitaSDK build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-vpk:
    runs-on: ubuntu-latest

    # Use the official VitaSDK container image directly.
    # This avoids brittle "download latest release asset" parsing.
    container:
      image: vitasdk/vitasdk:latest

    env:
      VITASDK: /usr/local/vitasdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show VitaSDK toolchain versions
        run: |
          echo "VITASDK=$VITASDK"
      - name: Install official latest stable VitaSDK
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl jq xz-utils

          ASSET_URL="$(curl -sSL https://api.github.com/repos/vitasdk/autobuilds/releases/latest \
            | jq -r '.assets[] | select(.name | test("vitasdk-.*-linux\\.tar\\.gz$")) | .browser_download_url' \
            | head -n1)"

          if [ -z "${ASSET_URL}" ] || [ "${ASSET_URL}" = "null" ]; then
            echo "Could not find VitaSDK Linux asset in latest release."
            exit 1
          fi

          curl -L "${ASSET_URL}" -o vitasdk-linux.tar.gz
          sudo mkdir -p /usr/local/vitasdk
          sudo tar -xzf vitasdk-linux.tar.gz -C /usr/local/vitasdk --strip-components=1

          echo "VITASDK=/usr/local/vitasdk" >> "$GITHUB_ENV"
          echo "/usr/local/vitasdk/bin" >> "$GITHUB_PATH"

      - name: Show VitaSDK toolchain versions
        run: |
          arm-vita-eabi-gcc --version
          cmake --version

      - name: Configure
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake

      - name: Build
        run: cmake --build build -- -j"$(nproc)"

      - name: Check expected outputs
        run: |
          test -f build/eboot.bin
          test -f build/VitaBrowserLite.vpk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-build
          path: |
            build/eboot.bin
            build/VitaBrowserLite.vpk

