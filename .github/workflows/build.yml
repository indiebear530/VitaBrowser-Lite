name: Build & Release Vita VPK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake build-essential python3

      - name: Install VitaSDK
        run: |
          git clone https://github.com/vitasdk/vdpm.git
          cd vdpm
          ./bootstrap-vitasdk.sh
          ./install-all.sh

      - name: Build project
        run: |
          mkdir build
          cd build
          cmake ..
          make

      - name: Get version tag
        id: vars
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          name: Vita Browser v${{ steps.vars.outputs.version }}
          files: build/*.vpk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
