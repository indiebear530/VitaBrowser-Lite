name: Build VPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools + Force latest Vita stubs
        run: |
          apt-get update && apt-get install -y git make curl
          # Force fresh headers and libs
          rm -rf /usr/local/vitasdk/arm-vita-eabi/lib/*.a /usr/local/vitasdk/arm-vita-eabi/include/*
          git clone --depth=1 https://github.com/vitasdk/vita-headers.git /tmp/headers
          cd /tmp/headers && make install
          git clone --depth=1 https://github.com/vitasdk/vita-libs.git /tmp/libs
          cd /tmp/libs && make install
          # Extra safety: copy stubs manually
          cp -v /tmp/libs/stubs/*.a /usr/local/vitasdk/arm-vita-eabi/lib/ 2>/dev/null || true

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -- -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-VPK
          path: build/*.vpk
