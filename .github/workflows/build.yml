name: Vita Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-vpk:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: apk add --no-cache make cmake ca-certificates openssl unzip curl

      - name: Build & install vita2dlib (robust download)
        run: |
          curl -L -f --retry 5 --retry-delay 5 -H "User-Agent: Mozilla/5.0" \
            -o /tmp/vita2d.zip https://github.com/vitasdk/vita2dlib/archive/refs/heads/master.zip
          
          # Verify the file is actually a zip
          file /tmp/vita2d.zip
          ls -l /tmp/vita2d.zip
          
          unzip /tmp/vita2d.zip -d /tmp
          cd /tmp/vita2dlib-master
          make -j2
          make install

      - name: Configure project
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=${VITASDK}/share/vita.toolchain.cmake

      - name: Build project
        run: cmake --build build -- -j2

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-VPK
          path: build/*.vpk
