name: Build VitaBrowser-Lite

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-vpk
          path: build/VitaBrowserLite.vpk
