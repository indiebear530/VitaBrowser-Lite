name: Vita Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-vpk:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: apk add --no-cache git make cmake ca-certificates openssl

      - name: Fix git HTTPS in container
        run: |
          git config --global http.sslVerify false
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Build & install vita2dlib
        run: |
          git clone --depth=1 https://github.com/vitasdk/vita2dlib.git /tmp/vita2d
          cd /tmp/vita2d
          make -j2
          make install

      - name: Configure project
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=${VITASDK}/share/vita.toolchain.cmake

      - name: Build project
        run: cmake --build build -- -j2

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowserLite-VPK
          path: build/*.vpk
