jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up VitaSDK environment variables
        run: echo "VITASDK=/opt/vitasdk" >> $GITHUB_ENV

      - name: Configure and Build
        run: |
          cmake -Bbuild -S. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake
          cmake --build build
        env:
          VITASDK: ${{ env.VITASDK }}
