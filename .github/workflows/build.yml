name: Build inside VitaSDK Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure & build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          make vpk || true   # Ignore error if vpk is not defined, adjust as needed

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaBrowser-Lite
          path: build/*.vpk
